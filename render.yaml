services:
  - type: web
    name: spark-energy-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir api --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 60 app:app
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: spark-energy-web
    runtime: static
    staticPublishPath: ./web
    buildCommand: ""
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
